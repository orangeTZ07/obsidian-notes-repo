<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gauss Theorem Region (Q8)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; color: white; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h3>高斯公式区域可视化 (第8题)</h3>
        <p>曲面: z = x² + y² (抛物面), x² + y² = 1 (圆柱面) 在第一卦限</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(2, 2, 2);
        controls.update();

        // Axes
        scene.add(new THREE.AxesHelper(2));

        // Material for surfaces
        const materialPara = new THREE.MeshPhysicalMaterial({ color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        const materialCyl = new THREE.MeshPhysicalMaterial({ color: 0x0000ff, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });

        // Paraboloid z = x^2 + y^2
        const paraGeo = new THREE.ParametricGeometry((u, v, target) => {
            // First octant only: u is r [0,1], v is theta [0, pi/2]
            const r = u;
            const theta = v * Math.PI / 2;
            const x = r * Math.cos(theta);
            const y = r * Math.sin(theta);
            const z = r * r;
            target.set(x, z, y); // Y is up in three.js
        }, 50, 50);
        const paraMesh = new THREE.Mesh(paraGeo, materialPara);
        scene.add(paraMesh);

        // Cylinder x^2 + y^2 = 1, z from 0 to 1
        const cylGeo = new THREE.ParametricGeometry((u, v, target) => {
            const theta = u * Math.PI / 2;
            const z = v;
            const x = Math.cos(theta);
            const y = Math.sin(theta);
            target.set(x, z, y);
        }, 50, 50);
        const cylMesh = new THREE.Mesh(cylGeo, materialCyl);
        scene.add(cylMesh);

        // Bottom plane
        const botGeo = new THREE.CircleGeometry(1, 32, 0, Math.PI/2);
        const botMat = new THREE.MeshBasicMaterial({color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.4});
        const botMesh = new THREE.Mesh(botGeo, botMat);
        botMesh.rotation.x = Math.PI / 2;
        scene.add(botMesh);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
